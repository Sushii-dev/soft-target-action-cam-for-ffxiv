name: Build

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.x"

      - name: Download Dalamud
        run: |
          $url = "https://goatcorp.github.io/dalamud-distrib/stg/latest.zip"
          $dir = "$env:AppData\XIVLauncher\addon\Hooks\dev"
          Invoke-WebRequest -Uri $url -OutFile "$env:TEMP\dalamud.zip"
          Expand-Archive -Path "$env:TEMP\dalamud.zip" -DestinationPath $dir -Force
          echo "DALAMUD_HOME=$dir" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        shell: pwsh

      - name: Restore
        run: dotnet restore ActionCamera.csproj

      - name: Build (Release)
        run: dotnet build ActionCamera.csproj -c Release --no-restore -p:Platform=x64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ActionCamera
          # DalamudPackager writes the installable zip here.
          path: bin/x64/Release/ActionCamera/latest.zip
          if-no-files-found: warn
