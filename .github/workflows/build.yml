name: Build

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.x"

      # Dalamud.NET.Sdk resolves Dalamud via a dedicated NuGet feed.
      # Download the latest Dalamud release and set DALAMUD_HOME so
      # the SDK can locate the runtime assemblies.
      - name: Download Dalamud
        run: |
          $url  = "https://goatcorp.github.io/dalamud-distrib/stg/latest.zip"
          $dest = "$env:TEMP\dalamud.zip"
          $dir  = "$env:AppData\XIVLauncher\addon\Hooks\dev"
          Invoke-WebRequest -Uri $url -OutFile $dest
          Expand-Archive -Path $dest -DestinationPath $dir -Force
          echo "DALAMUD_HOME=$dir" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        shell: pwsh

      - name: Restore
        run: dotnet restore ActionCamera.csproj

      - name: Build (Release)
        run: dotnet build ActionCamera.csproj --configuration Release --no-restore

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ActionCamera
          # DalamudPackager places the plugin zip here after a Release build.
          path: bin/x64/Release/ActionCamera/latest.zip
          if-no-files-found: warn
