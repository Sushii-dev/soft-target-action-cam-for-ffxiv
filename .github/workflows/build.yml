name: Build

on:
  push:
    branches: ["**"]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    outputs:
      zip_path: ${{ steps.paths.outputs.zip }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.x"

      - name: Download Dalamud
        run: |
          $url = "https://goatcorp.github.io/dalamud-distrib/stg/latest.zip"
          $dir = "$env:AppData\XIVLauncher\addon\Hooks\dev"
          Invoke-WebRequest -Uri $url -OutFile "$env:TEMP\dalamud.zip"
          Expand-Archive -Path "$env:TEMP\dalamud.zip" -DestinationPath $dir -Force
          echo "DALAMUD_HOME=$dir" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        shell: pwsh

      - name: List Dalamud dev folder contents
        run: Get-ChildItem "$env:DALAMUD_HOME" -Filter "*.dll" | Select-Object -ExpandProperty Name | Sort-Object
        shell: pwsh

      - name: Restore
        run: dotnet restore ActionCamera.csproj

      - name: Build (Release)
        run: dotnet build ActionCamera.csproj -c Release --no-restore -p:Platform=x64

      - name: List build output
        run: Get-ChildItem bin/x64/Release -Recurse -File | Select-Object -ExpandProperty FullName
        shell: pwsh

      - name: Record artifact path
        id: paths
        run: echo "zip=bin/x64/Release/ActionCamera/latest.zip" >> $env:GITHUB_OUTPUT
        shell: pwsh

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ActionCamera
          path: bin/x64/Release/**/latest.zip
          if-no-files-found: error

  release:
    needs: build
    runs-on: windows-latest
    # Only run when a version tag is pushed.
    if: startsWith(github.ref, 'refs/tags/v') || startsWith(github.ref, 'refs/tags/V')
    permissions:
      contents: write   # needed to create GitHub Releases
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: ActionCamera
          path: release

      - name: Stamp pluginmaster.json
        id: stamp
        run: |
          $tag = "${{ github.ref_name }}"
          $ver = $tag.TrimStart('vV')
          $ts  = [int](Get-Date -UFormat %s)

          $json = Get-Content pluginmaster.json | ConvertFrom-Json
          $json[0].AssemblyVersion = $ver
          $json[0].LastUpdate      = $ts
          $json | ConvertTo-Json -Depth 5 | Set-Content pluginmaster.json

          echo "VERSION=$ver" >> $env:GITHUB_OUTPUT
        shell: pwsh

      - name: Commit updated pluginmaster.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pluginmaster.json
          git commit -m "chore: bump pluginmaster.json to ${{ steps.stamp.outputs.VERSION }}" || echo "Nothing to commit"
          git push origin HEAD:main
        shell: pwsh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ steps.stamp.outputs.VERSION }}"
          generate_release_notes: true
          files: release/latest.zip
